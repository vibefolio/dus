name: Deploy to NCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Deploy to NCP server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} \
            "cd /root/projects/dlab-website && \
             git pull origin main && \
             docker compose up -d --build --no-deps && \
             sleep 15 && \
             docker compose exec -T dlab-website-app bin/rails db:migrate 2>/dev/null; \
             sleep 10 && \
             curl -sf http://localhost:4040/up && echo '✅ DUS 배포 완료' || echo '⚠️ 헬스체크 실패' && \
             docker exec npm-app-1 nginx -s reload || true"
